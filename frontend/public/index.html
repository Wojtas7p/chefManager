

<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>ChefManager - Login</title>
</head>
<body>
  <h1>flowgastro.com</h1>
  <h2>lub</h2>
  <h1>workflowgastro.com</h1>
   <h1>(remote management, SaaS, mobile-first)</h1>

  <hr/>

  <h2>Użytkownicy konta</h2>
<ul id="usersList"></ul>


<hr/>

  <!-- DOSTAWCY -->
  <h2>Dostawcy</h2>
  <input id="supplierName" placeholder="Nazwa dostawcy" />
  <button onclick="addSupplier()">Dodaj dostawcę</button>
  <ul id="suppliers"></ul>

  <!-- PRODUKTY -->
  <h2>Produkty</h2>
  <input id="productName" placeholder="Nazwa produktu" />
  <button onclick="addProduct()">Dodaj produkt</button>
  <ul id="products"></ul>


<!-- DODAJ USERA -->

  <h2>Admin – Dodaj użytkownika</h2>
<input id="uName" placeholder="Imię / nazwa użytkownika" />
<input id="uLogin" placeholder="Login">
<input id="uPass" placeholder="Hasło">
<label><input type="checkbox" id="pSup"> Dodawanie dostawców</label>
<label><input type="checkbox" id="pProd"> Dodawanie produktów</label>
<label><input type="checkbox" id="pRead"> Tylko podgląd</label>
<label><input type="checkbox" id="pSchedule"> Może tworzyć grafik</label>

<button onclick="addUser()">Dodaj użytkownika</button>


<!-- Plan table -->

<hr/>

<h2>Grafik pracy</h2>

<label>Miesiąc:</label>
<input type="month" id="scheduleMonth" />

<button onclick="loadSchedule()">Pokaż grafik</button>

<h3>Utwórz / nadpisz grafik</h3>

<div id="scheduleUsers"></div>

<button onclick="saveSchedule()">Zapisz grafik</button>

<h3>Podgląd</h3>
<div id="scheduleView"></div>

<!-- Days off -->

 <hr/>
<h2>Zgłoś urlop / wolne</h2>

<select id="offType">
  <option value="DAY_OFF">Dzień wolny</option>
  <option value="VACATION">Urlop</option>
</select>

<input type="date" id="offFrom" />
<input type="date" id="offTo" />

<button onclick="requestTimeOff()">Zgłoś</button>

<script>
const API = 'http://localhost:3000/api';
let token = null;
let currentSupplierId = null;




//======================= USER =======================

async function addUser() {
  const res = await fetch(`${API}/users`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      Authorization: `Bearer ${token}`
    },
  body: JSON.stringify({
  login: uLogin.value,
  password: uPass.value,
  name: uName.value,
  permissions: {
    canAddSuppliers: pSup.checked,
    canAddProducts: pProd.checked,
    readOnly: pRead.checked,
    canManageSchedule: pSchedule.checked // ⬅️ TU
  }
})

  });

  if (!res.ok) {
    alert('Błąd dodawania użytkownika');
    return;
  }

  alert('Użytkownik dodany');
}


async function loadUsers() {
  if (!token) return alert('Zaloguj się najpierw');

  const res = await fetch(`${API}/users`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });

  if (!res.ok) return alert('Błąd pobierania użytkowników');

  const users = await res.json();

  const ul = document.getElementById('usersList');
  ul.innerHTML = '';

  users.forEach(u => {
    const li = document.createElement('li');
    // li.textContent = `${u.name} (${u.role})`; // pokazujemy po name
    li.textContent = `${u.name} (${u.role}) - ${u.permissions.readOnly ? 'tylko podgląd' : 'pełne uprawnienia'})`;
    ul.appendChild(li);
  });

}



   
</script>
</body>
</html>
