<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>ChefManager - Login</title>
</head>
<body>
  <h1>ChefManager</h1>

  <!-- REJESTRACJA -->
  <h2>Rejestracja</h2>
  <input id="regLogin" placeholder="Login" />
  <input id="regPassword" type="password" placeholder="Hasło" />
  <button onclick="register()">Zarejestruj</button>

  <!-- LOGOWANIE -->
  <h2>Logowanie</h2>
  <input id="loginLogin" placeholder="Login" />
  <input id="loginPassword" type="password" placeholder="Hasło" />
  <button onclick="login()">Zaloguj</button>

  <hr/>

  <!-- DOSTAWCY -->
  <h2>Dostawcy</h2>
  <input id="supplierName" placeholder="Nazwa dostawcy" />
  <button onclick="addSupplier()">Dodaj dostawcę</button>
  <ul id="suppliers"></ul>

  <!-- PRODUKTY -->
  <h2>Produkty</h2>
  <input id="productName" placeholder="Nazwa produktu" />
  <button onclick="addProduct()">Dodaj produkt</button>
  <ul id="products"></ul>

<script>
const API = 'http://localhost:3000/api';
let token = null;
let currentSupplierId = null;

// ================== REJESTRACJA ==================
async function register() {
  const login = document.getElementById('regLogin').value;
  const password = document.getElementById('regPassword').value;

  await fetch(`${API}/auth/register`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ login, password })
  });
  alert('Zarejestrowano! Teraz się zaloguj.');
}

// ================== LOGOWANIE ==================
async function login() {
  const loginVal = document.getElementById('loginLogin').value;
  const password = document.getElementById('loginPassword').value;

  const res = await fetch(`${API}/auth/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ login: loginVal, password })
  });

  const data = await res.json();
  if (data.token) {
    token = data.token;
    alert('Zalogowano!');
    loadSuppliers();
  } else {
    alert('Błąd logowania');
  }
}

// ================== DOSTAWCY ==================
async function loadSuppliers() {
  const res = await fetch(`${API}/suppliers`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  const suppliers = await res.json();

  const ul = document.getElementById('suppliers');
  ul.innerHTML = '';

  suppliers.forEach(s => {
    const li = document.createElement('li');
    li.textContent = s.name;
    li.onclick = () => selectSupplier(s._id);
    ul.appendChild(li);
  });
}

async function addSupplier() {
  const name = document.getElementById('supplierName').value;
  await fetch(`${API}/suppliers`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    },
    body: JSON.stringify({ name })
  });
  loadSuppliers();
}

function selectSupplier(id) {
  currentSupplierId = id;
  loadProducts();
}

// ================== PRODUKTY ==================
async function loadProducts() {
  const res = await fetch(`${API}/products/${currentSupplierId}`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  const products = await res.json();

  const ul = document.getElementById('products');
  ul.innerHTML = '';

  products.forEach(p => {
    const li = document.createElement('li');
    li.textContent = p.name;
    ul.appendChild(li);
  });
}

async function addProduct() {
  if (!currentSupplierId) return alert('Wybierz dostawcę');
  const name = document.getElementById('productName').value;

  await fetch(`${API}/products`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    },
    body: JSON.stringify({ name, supplierId: currentSupplierId })
  });
  loadProducts();
}
</script>
</body>
</html>
