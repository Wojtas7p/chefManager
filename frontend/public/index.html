<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>ChefManager - Login</title>
</head>
<body>
  <h1>flowgastro.com</h1>
  <h2>lub</h2>
  <h1>workflowgastro.com</h1>
   <h1>(remote management, SaaS, mobile-first)</h1>

  <!-- REJESTRACJA -->
  <h2>Rejestracja</h2>
  <input id="regName" placeholder="Imię / nazwa" />
  <input id="regLogin" placeholder="Login" />
  <input id="regPassword" type="password" placeholder="Hasło" />
  <button onclick="register()">Zarejestruj</button>

  <!-- LOGOWANIE -->
  <h2>Logowanie</h2>
  <input id="loginLogin" placeholder="Login" />
  <input id="loginPassword" type="password" placeholder="Hasło" />
  <button onclick="login()">Zaloguj</button>

  <hr/>

  <h2>Użytkownicy konta</h2>
<ul id="usersList"></ul>


<hr/>

  <!-- DOSTAWCY -->
  <h2>Dostawcy</h2>
  <input id="supplierName" placeholder="Nazwa dostawcy" />
  <button onclick="addSupplier()">Dodaj dostawcę</button>
  <ul id="suppliers"></ul>

  <!-- PRODUKTY -->
  <h2>Produkty</h2>
  <input id="productName" placeholder="Nazwa produktu" />
  <button onclick="addProduct()">Dodaj produkt</button>
  <ul id="products"></ul>


<!-- DODAJ USERA -->

  <h2>Admin – Dodaj użytkownika</h2>
<input id="uName" placeholder="Imię / nazwa użytkownika" />
<input id="uLogin" placeholder="Login">
<input id="uPass" placeholder="Hasło">
<label><input type="checkbox" id="pSup"> Dodawanie dostawców</label>
<label><input type="checkbox" id="pProd"> Dodawanie produktów</label>
<label><input type="checkbox" id="pRead"> Tylko podgląd</label>
<label><input type="checkbox" id="pSchedule"> Może tworzyć grafik</label>

<button onclick="addUser()">Dodaj użytkownika</button>


<!--  CHAT -->


<h2>Czat</h2>

<select id="chatTarget">
  <option value="">Czat grupowy</option>
</select>

<div id="chatBox" style="border:1px solid #ccc;height:300px;overflow:auto;"></div>

<input id="chatInput" placeholder="Napisz wiadomość..." />
<button onclick="sendMessage()">Wyślij</button>


<select id="chatTarget" onchange="loadMessages()">

<!-- Plan table -->

<hr/>

<h2>Grafik pracy</h2>

<label>Miesiąc:</label>
<input type="month" id="scheduleMonth" />

<button onclick="loadSchedule()">Pokaż grafik</button>

<h3>Utwórz / nadpisz grafik</h3>

<div id="scheduleUsers"></div>

<button onclick="saveSchedule()">Zapisz grafik</button>

<h3>Podgląd</h3>
<div id="scheduleView"></div>

<!-- Days off -->

 <hr/>
<h2>Zgłoś urlop / wolne</h2>

<select id="offType">
  <option value="DAY_OFF">Dzień wolny</option>
  <option value="VACATION">Urlop</option>
</select>

<input type="date" id="offFrom" />
<input type="date" id="offTo" />

<button onclick="requestTimeOff()">Zgłoś</button>


<br>
<br>
<br>
<br>
<br>
<br>
<br>
<br>
<br>


<script>
const API = 'http://localhost:3000/api';
let token = null;
let currentSupplierId = null;

// ================== REJESTRACJA ==================

async function register() {
  await fetch(`${API}/auth/register`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      login: regLogin.value,
      password: regPassword.value,
      name: regName.value
    })
  });

  alert('Zarejestrowano – zaloguj się');
}


// ================== LOGOWANIE ==================

async function login() {
  const loginVal = document.getElementById('loginLogin').value;
  const password = document.getElementById('loginPassword').value;

  const res = await fetch(`${API}/auth/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ login: loginVal, password })
  });

  const data = await res.json();
  if (data.token) {
    token = data.token;
    alert('Zalogowano!');
    //==========================================

     if (!data.permissions?.canManageSchedule && data.role !== 'ADMIN') {
  document.querySelectorAll('h2').forEach(h2 => {
    if (h2.textContent.includes('Grafik')) h2.remove();
  });
}

    //============================================
    
   loadSuppliers();
loadUsers();
loadChatUsers();
loadMessages();
loadScheduleUsers();


  } else {
    alert('Błąd logowania');
  }
}

// ================== DOSTAWCY ==================

async function loadSuppliers() {
  const res = await fetch(`${API}/suppliers`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  const suppliers = await res.json();

  const ul = document.getElementById('suppliers');
  ul.innerHTML = '';

  suppliers.forEach(s => {
    const li = document.createElement('li');
    li.textContent = s.name;
    li.onclick = () => selectSupplier(s._id);
    ul.appendChild(li);
  });
}

async function addSupplier() {
  const name = document.getElementById('supplierName').value;
  await fetch(`${API}/suppliers`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    },
    body: JSON.stringify({ name })
  });
  loadSuppliers();
}

function selectSupplier(id) {
  currentSupplierId = id;
  loadProducts();
}

// ================== PRODUKTY ==================

async function loadProducts() {
  const res = await fetch(`${API}/products/${currentSupplierId}`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  const products = await res.json();

  const ul = document.getElementById('products');
  ul.innerHTML = '';

  products.forEach(p => {
    const li = document.createElement('li');
    li.textContent = p.name;
    ul.appendChild(li);
  });
}

async function addProduct() {
  if (!currentSupplierId) return alert('Wybierz dostawcę');
  const name = document.getElementById('productName').value;

  await fetch(`${API}/products`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    },
    body: JSON.stringify({ name, supplierId: currentSupplierId })
  });
  loadProducts();
}

//======================= USER =======================

async function addUser() {
  const res = await fetch(`${API}/users`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      Authorization: `Bearer ${token}`
    },
  body: JSON.stringify({
  login: uLogin.value,
  password: uPass.value,
  name: uName.value,
  permissions: {
    canAddSuppliers: pSup.checked,
    canAddProducts: pProd.checked,
    readOnly: pRead.checked,
    canManageSchedule: pSchedule.checked // ⬅️ TU
  }
})

  });

  if (!res.ok) {
    alert('Błąd dodawania użytkownika');
    return;
  }

  alert('Użytkownik dodany');
}


async function loadUsers() {
  if (!token) return alert('Zaloguj się najpierw');

  const res = await fetch(`${API}/users`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });

  if (!res.ok) return alert('Błąd pobierania użytkowników');

  const users = await res.json();

  const ul = document.getElementById('usersList');
  ul.innerHTML = '';

  users.forEach(u => {
    const li = document.createElement('li');
    // li.textContent = `${u.name} (${u.role})`; // pokazujemy po name
    li.textContent = `${u.name} (${u.role}) - ${u.permissions.readOnly ? 'tylko podgląd' : 'pełne uprawnienia'})`;
    ul.appendChild(li);
  });

}


// ============================ CHAT ====================================== //

async function loadChatUsers() {
   if (!token) return;
  const res = await fetch(`${API}/users`, {
    headers: { Authorization: `Bearer ${token}` }
  });

  const users = await res.json();
  const select = document.getElementById('chatTarget');

  users.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u._id;
    opt.textContent = u.name;
    select.appendChild(opt);
  });
}

//  pobieranie //

async function loadMessages() {
   if (!token) return;
  const receiverId = document.getElementById('chatTarget').value;
  const url = receiverId
    ? `${API}/chat?receiverId=${receiverId}`
    : `${API}/chat`;

  const res = await fetch(url, {
    headers: { Authorization: `Bearer ${token}` }
  });

  const messages = await res.json();
  const box = document.getElementById('chatBox');
  box.innerHTML = '';

  messages.forEach(m => {
    const div = document.createElement('div');
    div.textContent = `${m.sender.name}: ${m.text}`;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}
 //wysyłanie //

 async function sendMessage() {
   if (!token) return alert('Zaloguj się');
  const text = document.getElementById('chatInput').value;
  const receiverId = document.getElementById('chatTarget').value || null;

  await fetch(`${API}/chat`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      Authorization: `Bearer ${token}`
    },
    body: JSON.stringify({ text, receiverId })
  });

  document.getElementById('chatInput').value = '';
  loadMessages();
}

// Days Off



// Get Plan Table


async function requestTimeOff() {
  await fetch(`${API}/timeoff`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      Authorization: `Bearer ${token}`
    },
    body: JSON.stringify({
      type: offType.value,
      from: offFrom.value,
      to: offTo.value
    })
  });

  alert('Zgłoszenie zapisane');
}


// Obiekt do przechowywania tymczasowego grafiku przed wysłaniem
let tempSchedule = {};

// Po zaznaczeniu użytkownika generujemy pola dni
function handleUserCheckbox(e) {
  const userId = e.target.value;
  const container = document.getElementById('userDaysContainer_' + userId);

  if (e.target.checked) {
    // Usuń jeśli już istnieje
    if (container) container.remove();

    // Pobierz wybrany miesiąc
    const monthInput = document.getElementById('scheduleMonth').value;
    if (!monthInput) return alert('Wybierz miesiąc najpierw');

    const [year, month] = monthInput.split('-');
    const daysInMonth = new Date(year, month, 0).getDate(); // np. 28/30/31 dni

    // Stwórz kontener dla dni
    const div = document.createElement('div');
    div.id = 'userDaysContainer_' + userId;
    div.innerHTML = `<strong>Dni pracy dla ${e.target.parentNode.textContent.trim()}:</strong><br/>`;

    // Inicjalizuj w tempSchedule
    tempSchedule[userId] = [];

    for (let d = 1; d <= daysInMonth; d++) {
      const dayDiv = document.createElement('div');
      dayDiv.style.marginBottom = '2px';
      dayDiv.innerHTML = `
        <label>Dzień ${d}:</label>
        <input type="time" placeholder="Start" data-day="${d}" class="startHour" />
        <input type="time" placeholder="Koniec" data-day="${d}" class="endHour" />
      `;
      div.appendChild(dayDiv);
    }

    e.target.parentNode.appendChild(div);
  } else {
    // Usuń pola dni jeśli odznaczono użytkownika
    if (container) container.remove();
    delete tempSchedule[userId];
  }
}
 
async function loadScheduleUsers() {
  const res = await fetch(`${API}/users`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  const users = await res.json();
  const box = document.getElementById('scheduleUsers');
  box.innerHTML = '';

  users.forEach(u => {
    const div = document.createElement('div');
    div.innerHTML = `
      <label>
        <input type="checkbox" value="${u._id}" onchange="handleUserCheckbox(event)">
        ${u.name}
      </label>
    `;
    box.appendChild(div);
  });
}

async function saveSchedule() {
  const month = document.getElementById('scheduleMonth').value;
  if (!month) return alert('Wybierz miesiąc');

  const users = [];

  document.querySelectorAll('#scheduleUsers input:checked').forEach(checkbox => {
    const userId = checkbox.value;
    const days = [];

    const container = document.getElementById('userDaysContainer_' + userId);
    if (container) {
      container.querySelectorAll('div').forEach(dayDiv => {
        const start = dayDiv.querySelector('.startHour').value;
        const end = dayDiv.querySelector('.endHour').value;
        const day = parseInt(dayDiv.querySelector('.startHour').dataset.day);

        days.push({ day, startHour: start, endHour: end });
      });
    }

    users.push({ user: userId, days });
  });

  await fetch(`${API}/schedule`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      Authorization: `Bearer ${token}`
    },
    body: JSON.stringify({ month, users })
  });

  alert('Grafik zapisany');
}


async function loadSchedule() {
  const month = document.getElementById('scheduleMonth').value;
  if (!month) return alert('Wybierz miesiąc');

  const res = await fetch(`${API}/schedule?month=${month}`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  const data = await res.json();

  const view = document.getElementById('scheduleView');
  view.innerHTML = '';

  if (!data || !data.schedule) {
    view.textContent = 'Brak grafiku';
    return;
  }

  data.schedule.users.forEach(u => {
    const div = document.createElement('div');
    div.innerHTML = `<strong>${u.user.name}</strong><br/>`;

    const table = document.createElement('table');
    table.style.borderCollapse = 'collapse';
    table.style.marginBottom = '10px';

    u.days.forEach(d => {
      const tr = document.createElement('tr');

      const tdDay = document.createElement('td');
      tdDay.textContent = `Dzień ${d.day}`;
      tdDay.style.border = '1px solid #ccc';
      tdDay.style.padding = '2px 5px';

      const tdStart = document.createElement('td');
      tdStart.textContent = d.startHour || '-';
      tdStart.style.border = '1px solid #ccc';
      tdStart.style.padding = '2px 5px';

      const tdEnd = document.createElement('td');
      tdEnd.textContent = d.endHour || '-';
      tdEnd.style.border = '1px solid #ccc';
      tdEnd.style.padding = '2px 5px';

      tr.appendChild(tdDay);
      tr.appendChild(tdStart);
      tr.appendChild(tdEnd);

      table.appendChild(tr);
    });

    div.appendChild(table);
    view.appendChild(div);
  });
}

</script>
</body>
</html>
